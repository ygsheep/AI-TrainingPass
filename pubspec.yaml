name: trainingpass
description: "A universal quiz/exam app template for mobile and desktop."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  flutter_markdown: ^0.7.4
  cached_network_image: ^3.4.1
  flutter_slidable: ^4.0.0

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.6.2

  # Data Storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  permission_handler: ^11.3.1

  # Network
  dio: ^5.7.0
  connectivity_plus: ^6.1.0
  http: ^1.2.0
  file_picker: ^8.1.6

  # Utils
  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  intl: ^0.20.1
  uuid: ^4.5.1
  path: ^1.9.0
  logger: ^2.0.0

  # Animation
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  freezed: ^2.5.2
  freezed_annotation: ^2.4.4
  hive_generator: ^2.0.1
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/data/

  # fonts:
  #   - family: CustomFont
  #     fonts:
  #       - asset: assets/fonts/CustomFont-Regular.ttf
  #       - asset: assets/fonts/CustomFont-Bold.ttf
  #         weight: 700
